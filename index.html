<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meet Hardware Status</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <base target="_top">
  <style>
    @keyframes pulse-red {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
      }

      70% {
        transform: scale(1);
        box-shadow: 0 0 0 6px rgba(239, 68, 68, 0);
      }

      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
      }
    }

    .pulse {
      animation: pulse-red 2s infinite;
    }
  </style>
</head>

<body class="bg-slate-50 min-h-screen font-sans">

  <nav class="bg-white border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div class="flex items-center gap-4">
          <div class="bg-blue-600 p-2 rounded-lg">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
            </svg>
          </div>
          <h1 class="text-xl font-bold text-slate-900 tracking-tight">Meet Device Dashboard</h1>
          
          <select id="macro-region-select" onchange="changeMacroRegion(this.value)" class="ml-4 bg-slate-100 border-none text-sm font-bold text-slate-700 rounded-md py-1.5 pl-3 pr-8 focus:ring-2 focus:ring-blue-500 cursor-pointer">
            <option value="AU">AU Region</option>
            <option value="NZ">NZ Region</option>
            <option value="UK">UK Region</option>
            <option value="US">US Region</option>
          </select>
        </div>
        
        <div id="status-indicator" class="flex items-center gap-2 text-sm font-medium text-slate-500">
          <span class="relative flex h-2 w-2">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
          </span>
          Live Sync Active
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    
    <div id="stats-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-6 gap-4 mb-8">
      </div>

    <div id="incident-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
      <div class="col-span-full flex flex-col items-center justify-center py-20 text-slate-400">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mb-4"></div>
        <p>Fetching hardware status...</p>
      </div>
    </div>
  </main>

<script>
  // ==========================================
  // 1. GLOBAL STATE & CONFIGURATION
  // ==========================================
  let globalDashboardData = [];
  let currentMacroRegion = "AU"; // Default to AU
  let currentLocationFilter = "All"; // Default to All within AU

  // Map your macro-regions to their specific locations
  const MACRO_REGIONS = {
    "AU": ["Melbourne", "Sydney", "Brisbane", "Canberra", "Singapore"],
    "NZ": ["Auckland", "Wellington", "Hawkes Bay"],
    "UK": ["London", "Manchester", "Milton Keynes"],
    "US": ["San Mateo", "New York", "Denver", "Toronto", "Calgary"]
  };

  // ==========================================
  // 2. INITIALIZATION
  // ==========================================
  window.onload = function() {
    google.script.run
      .withSuccessHandler((data) => {
        globalDashboardData = data;
        renderDashboard(globalDashboardData);
      })
      .withFailureHandler(handleError)
      .getDashboardData();
  };

  // ==========================================
  // 3. FILTERING LOGIC
  // ==========================================
  function changeMacroRegion(region) {
    currentMacroRegion = region;
    currentLocationFilter = "All"; // Reset location filter when switching countries
    renderDashboard(globalDashboardData);
  }

  function filterLocation(loc) {
    // Toggle off if clicking the already active location
    currentLocationFilter = (currentLocationFilter === loc) ? "All" : loc;
    renderDashboard(globalDashboardData);
  }

  // ==========================================
  // 4. MAIN RENDER FUNCTION
  // ==========================================
  function renderDashboard(data) {
    const incidentContainer = document.getElementById('incident-container');
    const statsContainer = document.getElementById('stats-container');
    
    if (!data || data.length === 0) {
      renderStats(0, {}); // Render empty stats
      showAllClear(incidentContainer);
      return;
    }

    const activeData = data.filter(row => row[7] !== "Resolved");

    // --- TIER 1: MACRO REGION FILTER ---
    const validLocations = MACRO_REGIONS[currentMacroRegion];
    const macroData = activeData.filter(row => {
      const loc = row[1] ? row[1].trim() : "";
      return validLocations.includes(loc);
    });

    // Calculate Stats for the Top Buttons
    const allRoomsInMacro = {};
    macroData.forEach(row => {
      const [time, location, room] = row;
      if (!allRoomsInMacro[room]) allRoomsInMacro[room] = { location: location.trim() };
    });

    const locCounts = {};
    validLocations.forEach(loc => locCounts[loc] = 0); // Ensure all valid locations start at 0
    Object.values(allRoomsInMacro).forEach(r => {
      if (locCounts[r.location] !== undefined) locCounts[r.location]++;
    });

    // Render the Top Buttons dynamically
    renderStats(Object.keys(allRoomsInMacro).length, locCounts, validLocations);

    // --- TIER 2: SPECIFIC LOCATION FILTER ---
    const finalFilteredData = macroData.filter(row => {
      if (currentLocationFilter === "All") return true;
      return row[1].trim() === currentLocationFilter;
    });

    if (finalFilteredData.length === 0) {
      showAllClear(incidentContainer);
      return;
    }

    // --- GROUP INTO CARDS ---
    const rooms = {};
    finalFilteredData.forEach((row) => {
      const [time, location, room, serial, peripheral, issueID, ignored, resolved, notes] = row;
      
      if (!rooms[room]) {
        rooms[room] = {
          location: location ? location.trim() : "Unknown",
          serial: serial,
          time: time,
          peripherals: [],
          indices: [],
          isIgnored: ignored === "Ignored",
          notes: notes || ""
        };
      }
      rooms[room].peripherals.push(peripheral);
      rooms[room].indices.push(globalDashboardData.indexOf(row)); // Keep exact sheet index
    });

    // --- RENDER HTML CARDS ---
    incidentContainer.innerHTML = Object.entries(rooms).map(([roomName, roomData]) => {
      const issueBadges = roomData.peripherals.map(p => 
        `<span class="bg-red-100 text-red-700 px-2 py-1 rounded text-[10px] font-bold uppercase">${p}</span>`
      ).join('');

      const indicesJSON = JSON.stringify(roomData.indices);

      return `
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-full hover:border-blue-300 transition-all group">
          <div class="bg-slate-50/50 px-4 py-3 border-b border-slate-200 flex justify-between items-center">
            <div class="flex items-center gap-2">
              <span class="text-[10px] font-black uppercase tracking-widest text-slate-400">Region</span>
              <span class="text-xs font-bold text-slate-700 underline decoration-blue-500/30 decoration-2">${roomData.location}</span>
            </div>
            <div class="flex items-center gap-1.5 bg-red-50 px-2 py-1 rounded-md">
              <div class="h-1.5 w-1.5 rounded-full bg-red-500 pulse"></div>
              <span class="text-[10px] font-bold text-red-600 uppercase tracking-tight">${roomData.peripherals.length} Open Issues</span>
            </div>
          </div>
          
          <div class="p-5 flex-grow">
            <h3 class="text-lg font-bold text-slate-900 group-hover:text-blue-600 transition-colors">${roomName}</h3>
            <p class="text-xs text-slate-400 font-mono mt-1 mb-4">SN: ${roomData.serial || 'N/A'}</p>
            
            <div class="flex items-start gap-3 p-3 bg-slate-50 rounded-lg border border-slate-100">
              <div class="bg-white p-2 rounded shadow-sm mt-1">
                 <svg class="w-4 h-4 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
              </div>
              <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase leading-none mb-2">Issues Detected</p>
                <div class="flex flex-wrap gap-1">
                  ${issueBadges}
                </div>
              </div>
            </div>
            
            <div class="mt-4 flex items-center text-[11px] text-slate-400">
              <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
              Opened: ${roomData.time}
            </div>
          </div>
        
          <div class="px-4 py-3 bg-slate-50 border-t border-slate-100">
              <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Room Notes</label>
              <div class="flex gap-2">
                <input type="text" id="note-${roomName.replace(/\s+/g, '-')}" value="${roomData.notes || ''}"
                       class="w-full text-sm px-3 py-1.5 border border-slate-200 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none" 
                       placeholder="Add a note (e.g., Awaiting replacement part...)">
                
                <button onclick='saveNote("${roomName.replace(/\s+/g, '-')}", ${indicesJSON}, this)' 
                        class="px-3 py-1.5 bg-blue-100 hover:bg-blue-200 text-blue-700 text-xs font-bold rounded-md transition-colors whitespace-nowrap">
                  Save
                </button>
              </div>
            </div>

          <div class="flex justify-center gap-4 p-4 bg-slate-50/30 border-t border-slate-100">
            ${roomData.isIgnored 
              ? `<button                   
                  onclick='this.disabled=true; this.innerText="Processing..."; handleAction("Unignore", ${indicesJSON}, "${roomData.location}", "${currentMacroRegion}", "${roomName}")' 
                  class="w-full py-2.5 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-lg font-black text-sm transition-all transform active:scale-[0.98] shadow-sm">
                  Ignored
                 </button>` 
              : `<button 
                  onclick='this.disabled=true; this.innerText="Processing..."; handleAction("Ignore", ${indicesJSON}, "${roomData.location}", "${currentMacroRegion}", "${roomName}")' 
                  class="w-full py-2.5 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-lg font-black text-sm transition-all transform active:scale-[0.98] shadow-sm"
                 >
                  Ignore Room
                 </button>`
            }
            <button 
              onclick='this.disabled=true; this.innerText="Processing..."; handleAction("Resolve", ${indicesJSON}, "${roomData.location}", "${currentMacroRegion}", "${roomName}")'
              class="w-full py-2.5 bg-slate-900 hover:bg-blue-600 text-white rounded-lg text-sm font-bold transition-all transform active:scale-[0.98] shadow-sm"
            >
              Resolve Room
            </button>
          </div>
        </div>
      `;
    }).join('');
  }

  // ==========================================
  // 5. HELPER FUNCTIONS
  // ==========================================
  
  // Dynamically renders the top filter buttons based on active Macro Region
  function renderStats(total, locCounts, validLocations = MACRO_REGIONS[currentMacroRegion]) {
    const statsContainer = document.getElementById('stats-container');
    
    // Helper to determine styles
    const getStyles = (isActive) => isActive 
      ? 'border-blue-400 bg-blue-50 ring-2 ring-blue-400' 
      : 'border-slate-200 bg-white';

    let html = `
      <button onclick="filterLocation('All')" class="w-full text-left p-4 rounded-xl border ${getStyles(currentLocationFilter === 'All')} shadow-sm hover:shadow-md transition-all focus:outline-none">
        <p class="text-sm font-medium text-slate-500">Total ${currentMacroRegion} Issues</p>
        <p class="text-2xl font-bold text-slate-900">${total}</p>
      </button>
    `;

    validLocations.forEach(loc => {
      html += `
        <button onclick="filterLocation('${loc}')" class="w-full text-left p-4 rounded-xl border ${getStyles(currentLocationFilter === loc)} shadow-sm hover:shadow-md transition-all focus:outline-none">
          <p class="text-sm font-medium text-slate-500">${loc}</p>
          <p class="text-2xl font-bold text-slate-900">${locCounts[loc] || 0}</p>
        </button>
      `;
    });

    statsContainer.innerHTML = html;
  }

  function showAllClear(container) {
    container.innerHTML = `
      <div class="col-span-full bg-white border border-slate-200 rounded-2xl p-12 text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-100 mb-4 text-green-600">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <h2 class="text-2xl font-bold text-slate-900">All Clear</h2>
        <p class="text-slate-500 mt-2">No active hardware issues found for this view.</p>
      </div>
    `;
  }

  function handleAction(actionType, indices, location, region, roomName) {
    google.script.run
      .withSuccessHandler(() => {
         google.script.run.withSuccessHandler((newData) => {
            globalDashboardData = newData;
            renderDashboard(globalDashboardData);
         }).getDashboardData();
      })
      .processRoomAction(actionType, indices, location, region, roomName);
  }

  function handleError(err) {
    console.error(err);
    document.getElementById('incident-container').innerHTML = `
      <div class="col-span-full p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg">
        Error loading dashboard data. Please check your script permissions.
      </div>
    `;
  }

  function saveNote(safeRoomId, indices, btnElement) {
    const noteInput = document.getElementById(`note-${safeRoomId}`);
    const noteText = noteInput.value;
    
    btnElement.innerText = "Saving...";
    btnElement.disabled = true;
    btnElement.classList.replace('bg-blue-100', 'bg-slate-200');
    btnElement.classList.replace('text-blue-700', 'text-slate-500');

    google.script.run
      .withSuccessHandler(() => {
         btnElement.innerText = "Saved!";
         btnElement.classList.replace('bg-slate-200', 'bg-green-100');
         btnElement.classList.replace('text-slate-500', 'text-green-700');
         
         setTimeout(() => { 
           btnElement.innerText = "Save"; 
           btnElement.disabled = false;
           btnElement.classList.replace('bg-green-100', 'bg-blue-100');
           btnElement.classList.replace('text-green-700', 'text-blue-700');
         }, 2000);

         google.script.run.withSuccessHandler((newData) => {
            globalDashboardData = newData;
         }).getDashboardData();
      })
      .withFailureHandler((err) => {
         console.error("Failed to save note:", err);
         btnElement.innerText = "Error";
      })
      .updateRoomNotes(noteText, indices);
  }
</script>
</body>

</html>
